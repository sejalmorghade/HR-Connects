{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<style>
    /* Premium Login Styling - Purely CSS injected, no HTML elements altered */
    body {
        background: radial-gradient(circle at top left, #ebedee, #fdfbfb);
    }
    
    .row.justify-content-center > .col-md-4 {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 20px;
        padding: 3rem 2.5rem;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05), 0 5px 15px rgba(13, 110, 253, 0.08);
        margin-top: 4rem;
        transition: transform 0.3s ease;
    }
    
    .row.justify-content-center > .col-md-4:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 8px 20px rgba(13, 110, 253, 0.12);
    }

    h2 {
        font-weight: 800;
        color: #2c3e50;
        margin-bottom: 2rem;
        text-align: center;
        position: relative;
    }
    
    h2::after {
        content: '';
        display: block;
        width: 50px;
        height: 4px;
        background: linear-gradient(90deg, #0d6efd, #0dcaf0);
        margin: 10px auto 0;
        border-radius: 2px;
    }

    .form-label {
        font-weight: 600;
        color: #5a6a7c;
        font-size: 0.95rem;
        margin-bottom: 0.4rem;
    }

    .form-control {
        border-radius: 10px;
        border: 1px solid #dee2e6;
        padding: 0.8rem 1rem;
        background: rgba(255, 255, 255, 0.9);
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: #0dcaf0;
        box-shadow: 0 0 0 0.25rem rgba(13, 202, 240, 0.25);
        background: #ffffff;
    }

    .btn-primary {
        width: 100%;
        padding: 0.8rem;
        border-radius: 50px;
        font-weight: 700;
        background: linear-gradient(45deg, #0d6efd, #0dcaf0);
        border: none;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-top: 1rem;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(13, 110, 253, 0.4);
    }

    .btn-primary:hover {
        transform: scale(1.02);
        box-shadow: 0 6px 20px rgba(13, 110, 253, 0.6);
        background: linear-gradient(45deg, #0b5ed7, #0bacce);
    }
</style>

<div class="row justify-content-center">
    <div class="col-md-4">
        <h2>Login</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
    </div>
</div>
{% endblock %}
